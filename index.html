<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脚本分享站点</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Courier New", monospace;
        }
        body {
            min-height: 100vh;
            background-color: #000000;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #gridCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
        }
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }
        .card {
            width: 100%;
            max-width: 750px;
            background: rgba(5,5,5,0.75);
            border: 1px solid #0f0;
            border-radius: 10px;
            padding: 35px;
            color: #00ff00;
            box-shadow: 0 0 20px #00ff0044;
            opacity: 0;
        }
        h1 {
            margin-bottom: 24px;
            letter-spacing: 2px;
            overflow: hidden;
            white-space: nowrap;
            width:0;
        }
        h3{
            overflow: hidden;
            white-space: nowrap;
            width:0;
        }
        .script-block {
            background: #0a0a0a;
            padding: 16px;
            border-radius: 6px;
            margin: 15px 0;
            border-left:3px solid #0f0;
            white-space: pre-wrap;
            opacity:0;
        }
        .download-btn {
            display:block;
            width:200px;
            text-align:center;
            margin:20px auto 0;
            padding:12px;
            background:#006600;
            color:#0f0;
            text-decoration:none;
            border-radius:6px;
            font-size:17px;
            transition: 0.2s;
            opacity:0;
        }
        .download-btn:hover{
            background:#009900;
            box-shadow:0 0 12px #0f0;
        }
    </style>
</head>
<body>
    <canvas id="gridCanvas"></canvas>
    <canvas id="matrixCanvas"></canvas>
    <div class="card">
        <h1 id="title">工具脚本分享平台</h1>
        <h3 id="subTitle">可用脚本</h3>
        <div class="script-block" id="scriptText">
-- 这里粘贴你的Lua脚本内容
local function SafeLoad(url, timeout)
    timeout = timeout or 3
end
        </div>
        <a class="download-btn" id="downloadBtn" href="#">下载脚本文件</a>
    </div>

    <script>
        // 脉动渐变网格动画
        const gridCanvas = document.getElementById("gridCanvas");
        const gctx = gridCanvas.getContext("2d");
        let time = 0;
        const cellSize = 40;

        function resizeGrid() {
            gridCanvas.width = window.innerWidth;
            gridCanvas.height = window.innerHeight;
        }
        resizeGrid();
        window.addEventListener("resize", resizeGrid);

        function drawGrid() {
            time += 0.015;
            let alpha = 0.05 + Math.sin(time) * 0.085;
            gctx.clearRect(0, 0, gridCanvas.width, gridCanvas.height);
            gctx.strokeStyle = `rgba(0, 255, 0, ${alpha})`;
            gctx.lineWidth = 1;

            for(let x = 0; x <= gridCanvas.width; x += cellSize){
                gctx.beginPath();
                gctx.moveTo(x, 0);
                gctx.lineTo(x, gridCanvas.height);
                gctx.stroke();
            }
            for(let y = 0; y <= gridCanvas.height; y += cellSize){
                gctx.beginPath();
                gctx.moveTo(0, y);
                gctx.lineTo(gridCanvas.width, y);
                gctx.stroke();
            }
            requestAnimationFrame(drawGrid);
        }
        drawGrid();

        // 01数字雨动画
        const canvas = document.getElementById("matrixCanvas");
        const ctx = canvas.getContext("2d");
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        const chars = "HB";
        const fontSize = 16;
        let columns = canvas.width / fontSize;
        let drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.06)";
            ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px Courier New";
            for(let i = 0; i < drops.length; i++){
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975){
                    drops[i] = 0;
                }
                drops[i]++;
            }
            requestAnimationFrame(draw);
        }
        draw();

        // 打字机解密文字动画，顺序逐个显现
        const card = document.querySelector(".card");
        const title = document.getElementById("title");
        const subTitle = document.getElementById("subTitle");
        const scriptText = document.getElementById("scriptText");
        const downloadBtn = document.getElementById("downloadBtn");

        let step = 0;
        const interval = setInterval(()=>{
            step +=1;
            switch(step){
                case 1:
                    card.style.transition = "opacity 1s";
                    card.style.opacity = 1;
                    break;
                case 2:
                    title.style.transition = "width 1.8s";
                    title.style.width = "100%";
                    break;
                case 3:
                    subTitle.style.transition = "width 1.5s";
                    subTitle.style.width = "100%";
                    break;
                case 4:
                    scriptText.style.transition = "opacity 1.2s";
                    scriptText.style.opacity = 1;
                    break;
                case 5:
                    downloadBtn.style.transition = "opacity 1s";
                    downloadBtn.style.opacity = 1;
                    clearInterval(interval);
            }
        },700)
    </script>
</body>
</html>
